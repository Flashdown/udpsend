name: Build udpsend

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Linux: Set up C++ compiler
      - name: Set up C++ compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get dist-upgrade -y
          sudo apt-get install -y g++ make libidn2-0 libidn2-dev

      # macOS: Set up C++ compiler
      - name: Set up C++ compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gcc make libidn2

      # Windows: Set up MSVC environment and install libidn2 using vcpkg
      - name: Set up MSVC compiler and install libidn2 (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          REM Install vcpkg
          set VCPKG_ROOT=%USERPROFILE%\vcpkg
          if not exist "%VCPKG_ROOT%" (
            git clone https://github.com/microsoft/vcpkg.git "%VCPKG_ROOT%"
            cd "%VCPKG_ROOT%"
            bootstrap-vcpkg.bat
          )

          REM Set the environment variables for MSVC and vcpkg
          set PATH=%VCPKG_ROOT%\vcpkg.exe;%PATH%
          "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath > vs_path.txt
          set /p VS_PATH=<vs_path.txt
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 (
              echo Error: vcvars64.bat failed.
              exit /b %errorlevel%
          )

          REM Install libidn2 via vcpkg
          C:\vcpkg\vcpkg.exe install libidn2:x64-windows --verbose
          if errorlevel 1 exit /b %errorlevel%

          echo Checking vcpkg include directory:
          dir "%VCPKG_ROOT%\installed\x64-windows\include\"

          echo Checking vcpkg include directory:
          dir "%VCPKG_ROOT%\installed\x64-windows\include\"

          echo Checking vcpkg root directory:
          dir "%VCPKG_ROOT%\"

      # Build the program
      - name: Build udpsend (Linux)
        if: runner.os == 'Linux'
        run: |
          g++ -o udpsend_linux udpsend.cpp -O2 -s -std=c++11 -lidn2

      - name: Build udpsend (macOS)
        if: runner.os == 'macOS'
        run: |
          g++ -o udpsend_macos udpsend.cpp -O2 -s -std=c++11 \
          -I/opt/homebrew/opt/libidn2/include \
          -L/opt/homebrew/opt/libidn2/lib -lidn2

      - name: Build udpsend (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          REM Set up MSVC environment
          "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath > vs_path.txt
          set /p VS_PATH=<vs_path.txt
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"

          REM Build with vcpkg's installed libidn2
          cl /EHsc /O2 /MD udpsend.cpp /I "%VCPKG_ROOT%\installed\x64-windows\include" /link /LIBPATH:"%VCPKG_ROOT%\installed\x64-windows\lib" libidn2.lib ws2_32.lib /Feudpsend.exe

      # Test the program (optional)
      - name: Test udpsend (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Testing udpsend on Linux"
          ./udpsend_linux 127.0.0.1 12345 "Test Message"

      - name: Test udpsend (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Testing udpsend on macOS"
          ./udpsend_macos 127.0.0.1 12345 "Test Message"

      - name: Test udpsend (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo "Testing udpsend on Windows"
          udpsend.exe 127.0.0.1 12345 "Test Message"

       # Upload the binary artifact
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v3
        with:
          name: udpsend
          path: ./udpsend_linux

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v3
        with:
          name: udpsend
          path: ./udpsend_macos

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: udpsend
          path: ./udpsend.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Download the artifacts from the build job
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -la ./artifacts/udpsend/;ls -la ./artifacts/;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/udpsend/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
